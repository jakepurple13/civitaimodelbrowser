name: Android Release Workflow

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/**'
    tags-ignore:
      - 'v*'

  pull_request:
    branches:
      - main
      - master

  workflow_call:
  workflow_dispatch:
#    inputs:
#      releaseToGooglePlay:
#        description: 'Release to Google Play?'
#        required: true
#        default: 'false'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
#  cancel-in-progress: true

env:
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  aab:
    name: Generate AAB
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - run: |
          echo $CIVIT_SERVICES > android/google-services.json
        env:
          CIVIT_SERVICES: ${{ secrets.CIVIT_SERVICES }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Get tag name
        id: get_tag_name
        run: |
          set -x
          echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Export Libraries
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: "exportLibraryDefinitions"

      - name: Build Artifacts
        id: buildApks
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          wrapper-cache-enabled: true
          dependencies-cache-enabled: true
          configuration-cache-enabled: true
          arguments: android:bundle

      - uses: kevin-david/zipalign-sign-android-release@v2.0.1
        name: Sign app APK
        id: civit_browser_sign
        with:
          releaseDirectory: android/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Clean up build artifacts
        run: |
          cp ${{ steps.civit_browser_sign.outputs.signedReleaseFile }} civitbrowser-release.aab

      - uses: actions/upload-artifact@v4
        with:
          name: Signed Civit App
          path: civitbrowser-release.aab

  aabMinified:
    name: Generate Minified AAB
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - run: |
          echo $CIVIT_SERVICES > android/google-services.json
        env:
          CIVIT_SERVICES: ${{ secrets.CIVIT_SERVICES }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Get tag name
        id: get_tag_name
        run: |
          set -x
          echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Export Libraries
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: "exportLibraryDefinitions"

      - name: Build Artifacts
        id: buildApks
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          wrapper-cache-enabled: true
          dependencies-cache-enabled: true
          configuration-cache-enabled: true
          arguments: android:bundleReleaseMinified

      - uses: kevin-david/zipalign-sign-android-release@v2.0.1
        name: Sign app APK
        id: civit_browser_sign
        with:
          releaseDirectory: android/build/outputs/bundle/releaseMinified/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Clean up build artifacts
        run: |
          cp ${{ steps.civit_browser_sign.outputs.signedReleaseFile }} civitbrowser-minified-release.aab

      - uses: actions/upload-artifact@v4
        with:
          name: Signed Minified Civit App
          path: civitbrowser-minified-release.aab


  apk:
    name: Generate Apk
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - run: |
          echo $CIVIT_SERVICES > android/google-services.json
        env:
          CIVIT_SERVICES: ${{ secrets.CIVIT_SERVICES }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Get tag name
        id: get_tag_name
        run: |
          set -x
          echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Export Libraries
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: "exportLibraryDefinitions"

      - name: Build Artifacts
        id: buildApks
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          wrapper-cache-enabled: true
          dependencies-cache-enabled: true
          configuration-cache-enabled: true
          arguments: android:assembleRelease

      - uses: kevin-david/zipalign-sign-android-release@v2.0.1
        name: Sign app APK
        id: civit_apk_sign
        with:
          releaseDirectory: android/build/outputs/apk/release/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          # override default build-tools version (33.0.0) -- optional
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Clean up build artifacts
        run: |
          cp ${{ steps.civit_apk_sign.outputs.signedReleaseFile }} civit-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Signed Civit Apk
          path: civit-release.apk

  apkMinified:
    name: Generate Minified Apk
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - run: |
          echo $CIVIT_SERVICES > android/google-services.json
        env:
          CIVIT_SERVICES: ${{ secrets.CIVIT_SERVICES }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Get tag name
        id: get_tag_name
        run: |
          set -x
          echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Export Libraries
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: "exportLibraryDefinitions"

      - name: Build Minified Artifacts
        id: buildApks
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          wrapper-cache-enabled: true
          dependencies-cache-enabled: true
          configuration-cache-enabled: true
          arguments: android:assembleReleaseMinified

      - uses: kevin-david/zipalign-sign-android-release@v2.0.1
        name: Sign minified app APK
        id: civit_minified_apk_sign
        with:
          releaseDirectory: android/build/outputs/apk/releaseMinified/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          # override default build-tools version (33.0.0) -- optional
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Clean up build artifacts
        run: |
          cp ${{ steps.civit_minified_apk_sign.outputs.signedReleaseFile }} civit-release-minified.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Signed Minified Civit Apk
          path: civit-release-minified.apk

  baselineProfile:
    name: Collect Baseline Profile
    timeout-minutes: 75
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - run: |
          echo $CIVIT_SERVICES > android/google-services.json
        env:
          CIVIT_SERVICES: ${{ secrets.CIVIT_SERVICES }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run baseline profile collection on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -noaudio -no-boot-anim -camera-back none
          script: |
            set -eo pipefail
            mkdir -p benchmark/build/outputs/ci-artifacts

            adb wait-for-device
            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
              sleep 5
            done

            adb devices -l | tee benchmark/build/outputs/ci-artifacts/adb-devices.txt
            adb shell getprop | tee benchmark/build/outputs/ci-artifacts/emulator-getprop.txt

            cleanup() {
              adb logcat -d > benchmark/build/outputs/ci-artifacts/emulator-logcat.txt || true
            }
            trap cleanup EXIT

            ./gradlew exportLibraryDefinitions :benchmark:collectNonMinifiedBenchmarkBaselineProfile --stacktrace --console=plain

      - name: Upload baseline profile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-baseline-profile-diagnostics
          if-no-files-found: warn
          path: |
            benchmark/build/reports/**
            benchmark/build/outputs/androidTest-results/**
            benchmark/build/outputs/connected_android_test_additional_output/**
            benchmark/build/outputs/ci-artifacts/**
            android/src/**/generated/baselineProfiles/*.txt
            build/reports/problems/problems-report.html